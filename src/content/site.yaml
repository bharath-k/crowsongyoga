    - { name: "One month unlimited", price: "$150 / month", note: "Practise as often as you like", cta_label: "Start monthly", checkout_url: "https://checkout.square.site/merchant/MLNBT2S011XBA/checkout/WLS2FW5PQM66LUUKZSUQXCD5" }
  footnote: "Prices are in Canadian dollars, plus 5% GST. Please ask about need-based options."

# ---- Consent & Safety --------------------------------------------------------
consent:
  heading: "Consent & Safety"
  intro: >-
    Your body is your own. Our shala is built on consent, safety and respect,
    and hands-on assists are always offered, never assumed.
  points:
    - "Consent cards let you signal, silently and at any time, whether assists are welcome that day."
    - "You are always in charge of your practice, and can decline any adjustment, for any reason."
    - "A consent and waiver form is signed at the shala."
    - "Questions and conversations about touch, safety and consent are always welcome."

