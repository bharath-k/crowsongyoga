# ---- Teacher -----------------------------------------------------------------
teacher:
  heading: "Your Teacher"
  name: "christine white"
  title: "Ashtanga Vinyasa Yoga (Mysore style) & Therapeutic Yoga"
  bio: >-
    I'm christine. I've practised yoga for many years, and began Ashtanga
    Vinyasa in 2016. In 2018 I met Geoff MacKenzie and started practising at
    First Light Yoga. I completed my 300-hour Ashtanga Yoga Teacher Training in
    2022, then went on to assist and teach at First Light through 2026. Today I
    teach Ashtanga Vinyasa in the Mysore style alongside therapeutic yoga, and
    I'm completing my Diploma in Yoga Therapy at Ajna Yoga College.
  # Training and certifications (shown as a list under the bio).
  credentials_heading: "Training & Certifications"
  credentials:
    - "First Light Yoga (Geoff MacKenzie) - Ayurveda Dinacharya, 10 Habits, 18 months (Oct 2020 - Nov 2022)"
    - "Ancient Breath 2.0 - Harmony Slater (2021)"
    - "Vancouver Island Yoga School - 300-hour Ashtanga (July 2022)"
    - "First Light Yoga (Geoff MacKenzie) - Advanced Adjustments, 40 hours (Aug 2022)"
    - "First Light Yoga (Geoff MacKenzie) - Apprenticeship (2022 - 2026)"
    - "Yoga Education Center (E. Stern, R. Moses) - Pranayama Level 1, 50 hours (March 2023)"
    - "David & Jelena Yoga - Primary Series Intensive, 40 hours (2023)"
    - "David & Jelena Yoga - Assisting School, 40 hours (2023)"
    - "David Swenson - Advanced Yoga Adjustments, 40 hours (April 2023)"
    - "David Keil - Advanced Ashtanga Assisting, 50 hours (Aug 2023)"
    - "Yoga Education Center (E. Stern et al.) - Pranayama Level 2, 50 hours (Jan 2024)"
    - "AJNA Yoga College - IAYT Yoga Therapy (Feb 2024 - present)"
    - "David Garrigues - 7 Asana Principles, 70 hours (Aug 2024, New Mexico)"
    - "David Garrigues - Ashtanga Vinyasa Yoga Intensive (Jan - Feb 2026, Thailand)"
    - "AJNA Yoga College - 300-hour Advanced Teacher of Yoga (March 2026)"
    - "David Garrigues - Ashtanga Vinyasa Yoga Certification, 6-month (March - Sept 2026)"
    - "David Garrigues - 70 hours (Aug 2026, New Mexico)"
  membership: "Member of the Canadian Yoga Alliance - CYA-RYT 500 (April 2026)"
  # Replace the placeholder image by dropping a photo in public/images/ and
  # pointing this to it, e.g. "/images/teacher.jpg".
  image: "/images/teacher.jpg"
  image_alt: "Portrait of christine white"

# ---- Rates -------------------------------------------------------------------
rates:
  heading: "Rates"
  intro: "Simple, honest pricing. Practise as little or as often as you like."
  # For each item: when you have a Square (or other) checkout link, paste it
  # into checkout_url between the quotes. Until then the button shows
  # "coming soon". cta_label is the wording shown on the button.
