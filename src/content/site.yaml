# =============================================================================
#  YOUR WEBSITE CONTENT
#  -----------------------------------------------------------------------------
#  This is the ONLY file you need to edit to keep the website up to date.
#  Change the text between the quotes. Keep the words in front of the colon
#  (labels like `heading:` or `price:`) exactly as they are.
#
#  Tips:
#    - Always keep the spacing/indentation the same as the surrounding lines.
#    - Text with special characters is safest wrapped in "double quotes".
#    - Dates must be written as YEAR-MONTH-DAY, e.g. 2026-07-11.
#    - After you save, the website rebuilds automatically in about a minute.
# =============================================================================

# ---- Basic identity ----------------------------------------------------------
site_name: "Crow Song Ashtanga Yoga Shala"   # your shala's name (shown in the header)
tagline: "Ashtanga Vinyasa yoga in a small shala in Vancouver, BC"
location_short: "Vancouver, BC"

# ---- Top navigation links (keep this short) ----------------------------------
nav:
  - { label: "Practice", href: "#practice" }
  - { label: "Schedule", href: "#schedule" }
  - { label: "Teacher", href: "#teacher" }
  - { label: "Rates", href: "#rates" }
  - { label: "Visit", href: "#visit" }

# ---- Hero (the big welcome at the top) ---------------------------------------
hero:
  heading: "Breath, movement, stillness"
  subheading: >-
    Curious about Ashtanga yoga? Ready to deepen your practice and your
    connection with yourself? Join us.
  cta_label: "New students welcome"
  cta_href: "#visit"

# ---- The Practice ------------------------------------------------------------
practice:
  heading: "The Practice"
  intro: >-
    We practise Ashtanga Vinyasa Yoga (Primary and Intermediate Series) in a
    cozy shala at 156 E 7th Ave, Vancouver. We meet in the early hours,
    5:45 - 8:15 am, Monday to Friday, and every second Saturday. Alongside the
    asana practice, you'll learn pranayama and therapeutic techniques to support
    your health and longevity.
  points:
    - "Taught one-to-one within a shared, quiet room, at your own pace."
    - "A daily rhythm that builds strength, steadiness and calm."
    - "Suitable for complete beginners and seasoned practitioners alike."
    - "The teacher is present to guide, adjust and support, never to rush you."

# ---- Schedule ----------------------------------------------------------------
# The website reads the values below to show a live "Today at the shala" banner.
# You only edit the plain facts here. The clever bits (which Friday it is,
# whether today is a moon rest day) are worked out automatically.
schedule:
  heading: "Weekly Schedule"
  intro: "The shala is open Monday to Friday in the early hours, and every second Saturday."
  # Times and descriptions for each weekday.
  days:
    monday:    { time: "6:00 - 8:15 am", type: "Open Practice (no teacher present)" }
    tuesday:   { time: "5:45 - 8:15 am", type: "Moon Day - Take Rest" }
    wednesday: { time: "5:45 - 8:15 am", type: "Mysore Practice (teacher facilitated)" }
    thursday:  { time: "5:45 - 8:15 am", type: "Open Practice" }
    friday:    { time: "6:00 - 8:00 am", type: "LED Primary Series / Asana Skill Development + Pranayama" }

  # Fridays alternate between these two, week by week.
  friday_alternates: ["LED Primary Series", "Asana Skill Development + Pranayama"]
  # A Friday you KNOW the answer to, so alternation can be counted from it.
  # NOTE: please confirm which Friday is the LED Primary week and adjust the
  # date/label below so the "Today" banner shows the correct class.
  friday_anchor: { date: "2026-07-03", label: "LED Primary Series" }

  # Saturdays: only list the ones that actually run. Add a line per date.
  # The practice runs every second Saturday, 6:00 - 8:00 am, starting 2026-07-11.
  # Edit a theme to describe a specific Saturday; add or remove lines as needed.
  saturday_note: "Every second Saturday we gather for therapeutic yoga practices, 6:00 - 8:00 am, with a specific focus for your health and wellbeing."
  saturday_themes:
    - { date: "2026-07-11", theme: "Bhagavad Gita inspired yoga practice" }
    - { date: "2026-07-25", theme: "Therapeutic practice - a focus for your health and wellbeing" }
    - { date: "2026-08-08", theme: "Therapeutic practice - a focus for your health and wellbeing" }
    - { date: "2026-08-22", theme: "Therapeutic practice - a focus for your health and wellbeing" }
    - { date: "2026-09-05", theme: "Therapeutic practice - a focus for your health and wellbeing" }
    - { date: "2026-09-19", theme: "Therapeutic practice - a focus for your health and wellbeing" }
    - { date: "2026-10-03", theme: "Therapeutic practice - a focus for your health and wellbeing" }
    - { date: "2026-10-17", theme: "Therapeutic practice - a focus for your health and wellbeing" }
    - { date: "2026-10-31", theme: "Therapeutic practice - a focus for your health and wellbeing" }
    - { date: "2026-11-14", theme: "Therapeutic practice - a focus for your health and wellbeing" }
    - { date: "2026-11-28", theme: "Therapeutic practice - a focus for your health and wellbeing" }
    - { date: "2026-12-12", theme: "Therapeutic practice - a focus for your health and wellbeing" }
    - { date: "2026-12-26", theme: "Therapeutic practice - a focus for your health and wellbeing" }

  closed_note: "The shala is closed on Sundays."

  # Full & New Moon days are rest days (no class). The list below is pre-filled
  # with the 2026 full and new moons for Vancouver. Update it each year using
  # the link (choose Vancouver, and add both Full Moon and New Moon dates).
  moon_note: >-
    Full and New Moon days are observed as rest days, when the shala does not
    operate. They mark the peak and trough of the monthly cycle, and we honour
    them with rest.
  moon_days_link: "https://www.timeanddate.com/moon/phases/canada/vancouver"
